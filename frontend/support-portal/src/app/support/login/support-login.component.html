<div class="login-wrapper">
  <div class="login-card">

    <h2>
      {{ isRegister ? 'Support Agent Register' : 'Support Agent Login' }}
    </h2>

    <form autocomplete="off">

      <!-- USERNAME -->
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          name="support-username"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          [(ngModel)]="username"
          placeholder="Enter username"
        />
      </div>

      <!-- EMAIL (REGISTER ONLY) -->
      <div class="form-group" *ngIf="isRegister">
        <label>Email</label>
        <input
          type="email"
          name="support-email"
          autocomplete="off"
          [(ngModel)]="email"
          placeholder="Enter email"
        />
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="support-password"
          autocomplete="new-password"
          [(ngModel)]="password"
          placeholder="Enter password"
        />
      </div>

      <!-- SUCCESS -->
      <p class="success-text" *ngIf="successMessage">
        {{ successMessage }}
      </p>

      <!-- ERROR -->
      <p class="error-text" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <!-- SUBMIT -->
      <button
        type="button"
        class="login-btn"
        (click)="submit()"
        [disabled]="isLoading"
      >
        {{ isLoading ? 'Please wait...' : (isRegister ? 'Register' : 'Login') }}
      </button>

      <!-- TOGGLE -->
      <p class="toggle-text" (click)="toggleMode()">
        {{ isRegister
          ? 'Already have an account? Login'
          : 'New support agent? Register' }}
      </p>

    </form>
  </div>
</div>
