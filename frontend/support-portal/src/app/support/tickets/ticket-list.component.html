<h3>Assigned Tickets</h3>

<table>
  <tr>
    <th>ID</th>
    <th>AI Summary</th>
    <th>Severity</th>
    <th>Status</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let ticket of tickets">
    <td>{{ ticket.id }}</td>
    <td>{{ ticket.summary }}</td>
    <td>{{ ticket.severity }}</td>
    <td>{{ ticket.status }}</td>
    <td>
      <a [routerLink]="['/support/tickets', ticket.id]">Open</a>
    </td>
  </tr>
</table>
