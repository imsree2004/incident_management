<div class="role-page">
  <div class="role-card">
    <h1 class="role-title">AIIMS Incident Management System</h1>
    <p class="role-subtitle">Select your portal to continue</p>

    <div class="role-buttons">
      <button class="role-btn admin-btn" (click)="goAdmin()">
        <span class="btn-label">Admin Portal</span>
        <span class="btn-desc">System administration &amp; analytics</span>
      </button>
      <button class="role-btn support-btn" (click)="goSupport()">
        <span class="btn-label">Support Agent Portal</span>
        <span class="btn-desc">Ticket management &amp; resolution</span>
      </button>
    </div>

    <p class="role-footer">Authorized personnel only &middot; AIIMS Hospital</p>
  </div>
</div>
